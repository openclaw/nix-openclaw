name: CI

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    if: >-
      ${{
        github.repository == 'openclaw/nix-openclaw' &&
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        contains(fromJSON('["Asleep123","asleep123","badlogic","bjesuiter","christianklotz","cpojer","Evizero","evizero","gumadeiras","joshp123","mbelinky","mukhtharcm","obviyus","onutc","pasogott","sebslight","sergiopesch","shakkernerd","steipete","Takhoffman","takhoffman","thewilloftheshadow","tyler6204","vignesh07","github-actions[bot]"]'), github.actor)
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify flake.lock owners
        run: scripts/check-flake-lock-owners.sh

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run Linux CI aggregator
        run: timeout --foreground 50m nix build .#checks.x86_64-linux.ci --accept-flake-config

      - name: Dump failing source check log
        if: failure()
        run: |
          drv="$(nix eval --raw .#checks.x86_64-linux.source-checks.drvPath --accept-flake-config)"
          nix log "$drv" | tail -n 400 || true

  macos:
    if: >-
      ${{
        github.repository == 'openclaw/nix-openclaw' &&
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
        contains(fromJSON('["Asleep123","asleep123","badlogic","bjesuiter","christianklotz","cpojer","Evizero","evizero","gumadeiras","joshp123","mbelinky","mukhtharcm","obviyus","onutc","pasogott","sebslight","sergiopesch","shakkernerd","steipete","Takhoffman","takhoffman","thewilloftheshadow","tyler6204","vignesh07","github-actions[bot]"]'), github.actor)
      }}
    runs-on: macos-14
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Build Darwin CI aggregator
        timeout-minutes: 25
        run: nix build .#checks.aarch64-darwin.ci --accept-flake-config

      - name: Run HM activation
        timeout-minutes: 10
        run: scripts/hm-activation-macos.sh
